<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brightwoods Apartments | Premium Real Estate</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/tiny-slider.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo"><h1 class="brand-name">Brightwoods</h1></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li class="dropdown">
                    <a href="properties.html">Properties <i class="fa fa-chevron-down"></i></a>
                    <ul class="dropdown-menu">
                        <li><a href="properties.html">For Rent</a></li>
                        <li><a href="properties.html">For Sale</a></li>
                    </ul>
                </li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-section">
        <div class="hero-slider">
            <div class="hero-item" style="background-image: url('img/hero1.jpg');"></div>
            <div class="hero-item" style="background-image: url('img/hero2.jpg');"></div>
        </div>
        <div class="property-info-card">
            <span class="tag tag-red">FOR SALE</span>
            <h2 class="mt-2">Muthangari Residency</h2>
            <p class="text-muted">Off Kanjata Rd, Nairobi</p>
            <div class="card-specs">
                <span>3 Br</span><span>2 Ba</span><span>1,940 SqFt</span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <span class="price-text">Price on call</span>
                <button class="btn btn-sm btn-danger">View Details</button>
            </div>
        </div>
    </section>

    <section class="search-bar-red">
        <div class="container search-flex">
            <div class="field-group"><label>KEYWORD</label><input type="text" placeholder="Enter Keyword..."></div>
            <div class="field-group"><label>STATUS</label><select><option>All Status</option></select></div>
            <div class="field-group"><label>TYPE</label><select><option>All Types</option></select></div>
            <button class="btn-search-main">SEARCH</button>
        </div>
    </section>

    <section class="lifestyle-grid">
        <div class="lifestyle-card active">
            <div class="lifestyle-icon"><img src="img/icon-apt.png"></div>
            <h5>Apartment</h5><p>6 Properties</p>
        </div>
        <div class="lifestyle-card">
            <div class="lifestyle-icon"><img src="img/icon-house.png"></div>
            <h5>House</h5><p>4 Properties</p>
        </div>
        <div class="lifestyle-card">
            <div class="lifestyle-icon"><img src="img/icon-land.png"></div>
            <h5>Plots</h5><p>12 Properties</p>
        </div>
    </section>

    <script src="js/tiny-slider.js"></script>
    <script>
        tns({ container: '.hero-slider', items: 1, autoplay: true, nav: false, controls: true });
    </script>
</body>
</html>
