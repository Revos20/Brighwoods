<!DOCTYPE html>

    <link rel="stylesheet" href="css/tiny-slider.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo"><h1>Brightwoods</h1></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li class="dropdown">
                    <a href="#">Properties <i class="fa fa-chevron-down"></i></a>
                    <ul class="dropdown-menu">
                        <li><a href="#">For Rent</a></li>
                        <li><a href="#">For Sale</a></li>

                </li>
                <li><a href="contact.html">Contact us</a></li>
                <li><a href="blog.html">Blog</a></li>

    <section class="hero-section">
        <div class="my-slider">
            <div style="background-image:url('images/hero-bg-1.jpg'); height:80vh; background-size:cover;"></div>
            <div style="background-image:url('img/slide2.jpg'); height:80vh; background-size:cover;"></div>
        </div>

        <div class="property-info-card">
            <h2>Brightwoods Premium Residency</h2>

    <section class="search-bar-red">

            <div class="field-group">
                <label>STATUS</label>
                <select><option>All Status</option></select>
            </div>
            <button class="btn-search-white">SEARCH</button>

    <script src="js/tiny-slider.js"></script>
    <script>
        var slider = tns({
            container: '.my-slider',
            items: 1,
            slideBy: 'page',
            autoplay: true,
            controls: true,
            nav: false
        });
    </script>
