<body>

    <section class="hero-section">

            <div class="hero-item" style="background-image: url('images/hero_bg_10.jpeg');"
                 data-title="Executive Apartments Westlands"
                 data-loc="Rhapta Road, Westlands"

                 data-price="KES 18,000,000"
                 data-tags="FOR SALE">
            </div>
            <div class="hero-item" style="background-image: url('images/hero_bg_11.jpg');"
                 data-title="Prime Commercial Land"
                 data-loc="Kilimani, Nairobi"
                 data-specs="0.5 Acres | Fenced"
                 data-price="Price on call"

            </div>
            <div class="hero-item" style="background-image: url('images/hero_bg_12.jpg');"
                 data-title="Modern Suburban Villa"
                 data-loc="Karen, Nairobi"
                 data-specs="5 Br | 4 Ba | 4,000 SqFt"
                 data-price="KES 75,000,000"
                 data-tags="FOR SALE, LUXURY">
            </div>
        </div>

        <div class="property-info-card" id="infoCard">
            <h2 class="card-title"></h2>
            <p class="card-location"></p>
            <div class="card-specs">
                </div>
            <div class="card-footer-flex">
                <div class="card-tags">

        </div>
    </section>

    <section class="search-bar-red">

            <div class="search-flex">

                    <label>KEYWORD</label>
                    <div class="input-icon-wrap">
                        <input type="text" placeholder="Enter Keyword...">
                    </div>

                <div class="field-group">
                    <label>STATUS</label>
                    <select><option>All Status</option></select>
                </div>
                <div class="field-group">
                    <label>TYPE</label>
                    <select><option>All Types</option></select>
                </div>
                <button class="btn-search-main">Search</button>
            </div>
        </div>
    </section>

    <section class="explore-lifestyles">
        <div class="lifestyle-grid">
            <div class="lifestyle-card active">
                <div class="lifestyle-icon"><img src="images/afford8.jpeg"></div>

            </div>
            <div class="lifestyle-card">
                <div class="lifestyle-icon"><img src="images/apart13.jpg"></div>
                <h5>House</h5><p>4 Properties</p>
            </div>
            <div class="lifestyle-card">
                <div class="lifestyle-icon"><img src="images/apart11.jpg"></div>
                <h5>Luxury Homes</h5><p>1 Property</p>
            </div>
            <div class="lifestyle-card">

    <footer class="footer-global">
        <div class="container text-center">

            <p>© 2026 Brightwoods Apartments. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/tiny-slider.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Slider
            var slider = tns({
                container: '.hero-slider',
                items: 1,
                slideBy: 'page',
                autoplay: true,
                autoplayButtonOutput: false,
                controls: true,
                nav: false,
                mouseDrag: true,
                loop: true,
                speed: 800
            });

            const infoCard = document.getElementById('infoCard');

            // Logic to update Card Content
            const updateCard = () => {
                const info = slider.getInfo();
                // Get the current active slide element
                const activeSlide = info.container.querySelectorAll('.tns-slide-active')[0];
                
                if (!activeSlide) return;

                // Extract data-attributes
                const title = activeSlide.getAttribute('data-title');
                const loc = activeSlide.getAttribute('data-loc');
                const specs = activeSlide.getAttribute('data-specs');
                const price = activeSlide.getAttribute('data-price');
                const tags = activeSlide.getAttribute('data-tags').split(',');

                // Animate Out
                infoCard.style.opacity = '0';
                infoCard.style.transform = 'translateY(-40%)';

                setTimeout(() => {
                    // Update HTML content
                    infoCard.querySelector('.card-title').innerText = title;
                    infoCard.querySelector('.card-location').innerText = loc;
                    infoCard.querySelector('.card-price').innerText = price;
                    
                    // Format Specs (Split by | pipe)
                    const specsArray = specs.split('|');
                    infoCard.querySelector('.card-specs').innerHTML = 
                        specsArray.map(s => `<span>${s.trim()}</span>`).join('');

                    // Format Tags
                    infoCard.querySelector('.card-tags').innerHTML = tags.map(t => {
                        const trimmed = t.trim();
                        const colorClass = (trimmed === 'FOR SALE' || trimmed === 'FEATURED') ? 'tag-red' : 'tag-orange';
                        return `<span class="tag ${colorClass}">${trimmed}</span>`;
                    }).join('');

                    // Animate In
                    infoCard.style.opacity = '1';
                    infoCard.style.transform = 'translateY(-50%)';
                }, 300);
            };

            // Hook into Tiny Slider change event
            slider.events.on('indexChanged', updateCard);
            
            // Initial load
            updateCard();
        });
    </script>
</body>
</html>
