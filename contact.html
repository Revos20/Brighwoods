<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Brightwoods Apartments</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo"><h1>Brightwoods</h1></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html" class="active">Contact us</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
        </nav>
    </header>

    <main class="container py-5">
        <div class="text-center mb-5">
            <p class="lead">For more information about our services, get in touch with our expert consultants. We're always eager to hear from you!</p>
        </div>

        <form class="contact-form">
            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control custom-input" placeholder="First Name">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" class="form-control custom-input" placeholder="Last Name">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="email" class="form-control custom-input" placeholder="Your Email">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="tel" class="form-control custom-input" placeholder="Your Phone">
                </div>
            </div>

            <div class="department-selector mb-4">
                <label class="d-block mb-2">Department:</label>
                <div class="d-flex flex-wrap gap-3">
                    <label><input type="checkbox"> Agency</label>
                    <label><input type="checkbox"> Management</label>
                    <label><input type="checkbox"> Valuation</label>
                    <label><input type="checkbox"> Consultancy</label>
                    <label><input type="checkbox"> Others</label>
                </div>
            </div>

            <div class="mb-4">
                <textarea class="form-control custom-input" rows="5" placeholder="Messenger"></textarea>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-danger px-5 py-2">Submit</button>
            </div>
        </form>

        <div class="office-info mt-5 pt-5 border-top">
            <h3>Visit our office</h3>
            <p><i class="fa fa-map-marker-alt text-danger"></i> THE ARCH PLACE-8TH FLOOR, NYANGUMI ROAD OFF DENNIS PRITT ROAD, KILIMANI-NAIROBI</p>
        </div>
    </main>

</body>
</html>
