<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Brightwoods</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center mb-5">Get In Touch</h2>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form class="row g-3">
                    <div class="col-md-6"><input type="text" class="form-control p-3" placeholder="First Name"></div>
                    <div class="col-md-6"><input type="email" class="form-control p-3" placeholder="Email"></div>
                    <div class="col-12"><textarea class="form-control p-3" rows="5" placeholder="Your Message"></textarea></div>
                    <div class="col-12 text-center"><button class="btn btn-danger px-5 py-3">SEND MESSAGE</button></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
